name: Update Winget Manifest

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.0.226)"
        required: true
      target_repo:
        description: "Target GitHub repo (owner/name)"
        required: false
        default: "microsoft/modernize-cli"

jobs:
  update-winget-manifest:
    runs-on: windows-latest
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (tag: $TAG)"

      - name: Install wingetcreate
        shell: pwsh
        run: |
          curl.exe -JLO https://aka.ms/wingetcreate/latest

      - name: Generate updated winget manifest
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $repo = "${{ inputs.target_repo || 'microsoft/modernize-cli' }}"
          $baseUrl = "https://github.com/$repo/releases/download/$tag"

          $installerUrlx64 = "$baseUrl/modernize_${version}_windows_x64.msi"
          $installerUrlarm64 = "$baseUrl/modernize_${version}_windows_arm64.msi"

          $releaseNotesUrl = "https://github.com/$repo/releases/tag/$tag"

          .\wingetcreate.exe update GitHub.Copilot.modernization.agent `
            --version $version `
            --urls "$installerUrlx64|x64" "$installerUrlarm64|arm64" `
            --release-notes-url $releaseNotesUrl `
            --out manifests

          echo "Generated manifests:"
          Get-ChildItem -Recurse -File manifests | ForEach-Object {
            echo "--- $($_.FullName) ---"
            Get-Content $_.FullName
          }

      - name: Submit PR to winget-pkgs
        shell: pwsh
        env:
          WINGETCREATE_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $installerManifest = Get-ChildItem -Path manifests -Filter "*.installer.yaml" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $installerManifest) {
            Write-Error "No installer manifest found in manifests directory."
            exit 1
          }
          $manifestPath = Split-Path $installerManifest
          echo "Submitting manifests from: $manifestPath"
          Get-ChildItem $manifestPath
          .\wingetcreate.exe submit $manifestPath
